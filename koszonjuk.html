<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Köszönjük! - 3D Verda</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
            text-align: center;
        }
        .container {
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: #333; }
        p { color: #666; margin-bottom: 30px; }
        .back-button {
            display: inline-block;
            padding: 12px 24px;
            background-color: #000; /* Ezt állítsd a weboldalad fő színére */
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: opacity 0.3s;
        }
        .back-button:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Üzeneted megérkezett!</h1>
        <p>Köszönjük, hogy felkerestél minket. Hamarosan jelentkezünk a válaszunkkal.</p>
        <a href="index.html" class="back-button">← Vissza a főoldalra</a>
    </div>
</body>
</html>
